  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [activePipeline, setActivePipeline] = useState('rlis'); // 'rlis' or 'insight'
      const [selectedProject, setSelectedProject] = useState(null); // No project selected by default
      const [pipelineStep, setPipelineStep] = useState(0);
      const [showSkinPipeline, setShowSkinPipeline] = useState(false);
      const [hoveredProject, setHoveredProject] = useState(null);

      // Building section items (strictly informational)
      const buildingItems = [
        { id: 'nlp', label: 'NLP Systems' },
        { id: 'kg', label: 'Knowledge Graph Platforms' },
        { id: 'gis', label: 'Geospatial Intelligence Applications' }
      ];

      // RLIS Punjab Pipeline Steps
      const rlisPipeline = [
        {
          stage: "Driver Log",
          desc: "Raw Hinglish logging ingress",
          code: "log = \"Driver report: bypass road te crash hoya near GT road cross over\""
        },
        {
          stage: "Hinglish NLP",
          desc: "Entity recognition parser extraction",
          code: "nlp_tokens = tokenizer.parse_bilingual(log) \n# -> ['crash', 'GT road', 'bypass']"
        },
        {
          stage: "Incident Classification",
          desc: "Multi-class categorization validation",
          code: "classification = model.predict(nlp_tokens) \n# Returns: ACCIDENT (conf: 0.94)"
        },
        {
          stage: "Severity Detection",
          desc: "Analyzing disruption indicators",
          code: "severity = analyze_impact(nlp_tokens) \n# Returns: HIGH (Bypass block detected)"
        },
        {
          stage: "PostGIS Resolution",
          desc: "Query spatial data geometry points",
          code: "SELECT ST_AsGeoJSON(geom) \nFROM punjab_roads \nWHERE name % 'GT road bypass';"
        },
        {
          stage: "Map Visualization",
          desc: "Deploy coordinates metadata object",
          code: "payload = { \n  state: 'active', \n  lat: 31.326, \n  lng: 75.576, \n  severity: 'high' \n}"
        },
        {
          stage: "Glass Box Reasoning",
          desc: "Interpretability output explanation",
          code: "explanation = explain_prediction(model) \n# 'Incident mapped via bilingual verb \\'crash hoya\\''"
        }
      ];

      // InsightLens Pipeline Steps
      const insightPipeline = [
        {
          stage: "Document Upload",
          desc: "Buffered async ingestion queue streams",
          code: "await storage_client.upload(file_stream)"
        },
        {
          stage: "Text Extraction",
          desc: "Read unformatted binary document trees",
          code: "raw_text = document_parser.extract_content(file_stream)"
        },
        {
          stage: "Entity Recognition",
          desc: "spaCy NER mapping parsing layers",
          code: "entities = spacy_ner(raw_text) \n# -> [('Aditya', 'PERSON'), ('Systems', 'ORG')]"
        },
        {
          stage: "Relationship Extraction",
          desc: "Identify semantic association rules",
          code: "relations = map_semantics(entities) \n# -> ('Aditya')-[:DEVELOPED]->('Systems')"
        },
        {
          stage: "Knowledge Graph Construction",
          desc: "Build node connection metadata",
          code: "nodes = build_graph_nodes(entities, relations)"
        },
        {
          stage: "Neo4j Storage",
          desc: "Execute database relationship insert",
          code: "tx.run(\n  \"MERGE (p:Person {name: $n1}) \" +\n  \"MERGE (o:Org {name: $n2}) \" +\n  \"CREATE (p)-[:MEMBER]->(o)\"\n)"
        }
      ];

      const getActivePipelineData = () => {
        return activePipeline === 'rlis' ? rlisPipeline : insightPipeline;
      };

      // Automatically advance pipeline step over time
      useEffect(() => {
        const pipelineLength = getActivePipelineData().length;
        const interval = setInterval(() => {
          setPipelineStep((prev) => (prev + 1) % pipelineLength);
        }, 4500);
        return () => clearInterval(interval);
      }, [activePipeline]);

      const handleViewArchitecture = (pipelineKey, e) => {
        if (e) e.stopPropagation();
        setSelectedProject(pipelineKey);
        setActivePipeline(pipelineKey);
        setPipelineStep(0);
        const element = document.getElementById('architecture-explorer');
        if (element) {
          element.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      };

      const handleCardSelect = (key, e) => {
        if (e) e.stopPropagation();
        setSelectedProject(key);
        if (key === 'rlis' || key === 'insight') {
          setActivePipeline(key);
          setPipelineStep(0);
        } else if (key === 'skin') {
          setShowSkinPipeline(true);
        }
      };

      // Determine active project highlighting based on hover & select coordination
      const isCardActive = (key) => {
        if (hoveredProject !== null) {
          return hoveredProject === key;
        }
        return selectedProject === key;
      };

        const active = isCardActive(key);
        if (active) {
          return 'border-emerald-500/50 bg-[#111116] shadow-[0_0_24px_rgba(16,185,129,0.08)]';
        } else {
          return 'border-zinc-800 bg-[#0B0B0F] hover:border-emerald-500/30 hover:shadow-[0_0_16px_rgba(16,185,129,0.04)]';

      const handleGlobalClick = () => {
        setSelectedProject(null);
      };

                </a>
